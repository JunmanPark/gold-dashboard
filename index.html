<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Signal Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0D0D0D;--bg1:#0a0a0a;--bg2:#141414;--border:#2A2A2A;--border2:#333;--gold:#C9A84C;--gold-dim:rgba(201,168,76,.15);--gold-line:rgba(201,168,76,.3);--orange:#FF8C42;--orange-dim:rgba(255,140,66,.12);--orange-line:rgba(255,140,66,.28);--blue:#5C9EFF;--blue-dim:rgba(92,158,255,.12);--blue-line:rgba(92,158,255,.28);--purple:#B06EFF;--purple-dim:rgba(176,110,255,.12);--purple-line:rgba(176,110,255,.28);--green:#3DD68C;--red:#FF5C5C;--muted:#555;--muted2:#666680;--text:#E8E0D0;--text2:#998fa0}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 32px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a0a0f,var(--bg));position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.logo{display:flex;align-items:baseline;gap:10px}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--gold)}
.logo-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2)}
.hdr-right{display:flex;align-items:center;gap:8px}
.btn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;background:none;border:1px solid var(--border2);color:var(--muted2);padding:6px 14px;cursor:pointer;border-radius:2px;transition:all .2s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-red:hover{border-color:var(--red);color:var(--red)}
#clock{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
.acc-bar{display:flex;align-items:center;padding:0 32px;border-bottom:1px solid var(--border);background:var(--bg1)}
.acc-btn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;background:none;border:none;border-bottom:2px solid transparent;padding:10px 18px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s;color:var(--muted2)}
.acc-btn:hover{color:var(--text2)}
.acc-btn.al{color:var(--green);border-bottom-color:var(--green)}
.acc-btn.ad{color:var(--gold);border-bottom-color:var(--gold)}
.acc-dot{width:6px;height:6px;border-radius:50%}
.acc-dot.live{background:var(--green);box-shadow:0 0 5px var(--green)}
.acc-dot.demo{background:var(--gold)}
.acc-cnt{font-size:10px;padding:1px 5px;border-radius:10px;background:var(--border2)}
.acc-div{width:1px;height:18px;background:var(--border2);margin:0 4px}
.sbar{display:flex;align-items:center;justify-content:space-between;padding:5px 32px;background:var(--bg1);border-bottom:1px solid var(--border)}
.sl{display:flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--muted)}
.sdot.on{background:var(--green);box-shadow:0 0 5px var(--green)}
.abar{display:none;padding:7px 32px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--gold);background:rgba(201,168,76,.07);border-bottom:1px solid rgba(201,168,76,.2);letter-spacing:1px}
.abar.show{display:block}
.tband{display:none;border-bottom:1px solid var(--border)}
.tband.show{display:grid}
.tbl2{grid-template-columns:repeat(5,1fr)}
.tbl3{grid-template-columns:repeat(6,1fr)}
.tc{padding:11px 18px;border-right:1px solid var(--border);position:relative;overflow:hidden}
.tc:last-child{border-right:none}
.tc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,.05)}
.tc.ce::before{background:var(--blue-line)}
.tc.cs::before{background:var(--orange-line)}
.tc.cv::before{background:var(--purple-line)}
.tlbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:4px}
.tval{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:500}
.tsub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted2);margin-top:2px}
.ntabs{display:flex;padding:0 32px;border-bottom:1px solid var(--border);margin-top:14px;gap:2px}
.tbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted2);background:none;border:none;padding:9px 15px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tbtn:hover{color:var(--text2)}
.tbtn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tp{display:none}.tp.active{display:block}
main{padding:20px 32px 48px}
.frow{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.fl{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)}
.fb{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;background:none;border:1px solid var(--border2);color:var(--muted2);padding:4px 12px;cursor:pointer;border-radius:2px;transition:all .15s}
.fb:hover{border-color:var(--gold);color:var(--gold)}
.fa{border-color:var(--text2);color:var(--text2)}
.fe{border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
.fs{border-color:var(--orange);color:var(--orange);background:var(--orange-dim)}
.fv{border-color:var(--purple);color:var(--purple);background:var(--purple-dim)}
.scrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:9px;margin-bottom:16px}
.sc{background:var(--bg2);border:1px solid var(--border);padding:13px 16px;border-radius:2px;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--gold-line),transparent)}
.sclbl{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:5px}
.scval{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:500}
.tw{background:var(--bg2);border:1px solid var(--border);border-radius:2px;overflow:hidden;margin-bottom:22px}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg1);border-bottom:1px solid var(--border2)}
th{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);padding:8px 12px;text-align:left}
td{padding:11px 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr:hover td{background:rgba(255,255,255,.015)}
tbody tr:last-child td{border-bottom:none}
.er{text-align:center;padding:28px;color:var(--muted2);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase}
.bdg{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;padding:2px 6px;border-radius:2px;text-transform:uppercase;font-weight:600}
.be{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-line)}
.bs{background:var(--orange-dim);color:var(--orange);border:1px solid var(--orange-line)}
.bv{background:var(--purple-dim);color:var(--purple);border:1px solid var(--purple-line)}
.bb{background:rgba(61,214,140,.1);color:var(--green);border:1px solid rgba(61,214,140,.2)}
.bsl{background:rgba(255,92,92,.1);color:var(--red);border:1px solid rgba(255,92,92,.2)}
.bop{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.2)}
.pp{color:var(--green);font-weight:600}.pn{color:var(--red);font-weight:600}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:13px}
.pcard{background:var(--bg2);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.pch{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;background:var(--bg1);border-bottom:1px solid var(--border)}
.pcl{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text)}
.pcp{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600}
.pcb{padding:9px 15px;border-bottom:1px solid var(--border)}
.pcr{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);font-family:'IBM Plex Mono',monospace}
.pcr:last-child{border-bottom:none}
.pck{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted2)}
.pcv{font-size:14px}
.wrw{padding:9px 15px;border-bottom:1px solid var(--border)}
.wrl{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted2);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase}
.wrt{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.wrf{height:100%;border-radius:2px;transition:width .6s ease}
.pcsub{display:grid;grid-template-columns:1fr 1fr}
.pcsub .sch{padding:11px 14px;border-right:1px solid var(--border);border-bottom:none}
.pcsub .sch:last-child{border-right:none}
.sch.se{background:linear-gradient(150deg,var(--blue-dim),transparent)}
.sch.ss{background:linear-gradient(150deg,var(--orange-dim),transparent)}
.sch.sv{background:linear-gradient(150deg,var(--purple-dim),transparent)}
.sht{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.se .sht{color:var(--blue)}.ss .sht{color:var(--orange)}.sv .sht{color:var(--purple)}
.shr{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;padding:2px 0}
.shk{font-size:12px;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted2)}
.shv{font-size:14px}
.pce{background:var(--bg2);border:1px solid var(--border);border-radius:3px;display:flex;align-items:center;justify-content:space-between;padding:13px 15px;opacity:.4}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;align-items:center;justify-content:center}
.mbg.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:26px 30px;min-width:310px}
.mtit{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold);margin-bottom:16px}
.mlbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:8px}
.asel{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.aopt{border:1px solid var(--border2);border-radius:3px;padding:14px 10px;cursor:pointer;transition:all .2s;text-align:center;background:none;width:100%}
.aopt:hover{border-color:var(--gold)}
.aopt.sl{border-color:var(--green);background:rgba(61,214,140,.07)}
.aopt.sd{border-color:var(--gold);background:var(--gold-dim)}
.aopt .oi{font-size:22px;margin-bottom:6px}
.aopt .on{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text)}
.aopt .os{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--muted2);margin-top:3px}
.mbts{display:flex;gap:8px;justify-content:flex-end}
.bcan{background:none;border:1px solid var(--border2);color:var(--muted2);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;cursor:pointer;border-radius:2px}
.bcon{background:none;border:1px solid var(--gold);color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;cursor:pointer;border-radius:2px}
.bcon:disabled{opacity:.3;cursor:not-allowed}
.dov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:center;justify-content:center}
.dov.show{display:flex}
.din{border:1px dashed rgba(201,168,76,.4);border-radius:4px;padding:48px 72px;text-align:center}
.din p{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:3px;text-transform:uppercase}
.lbox{border:1px dashed var(--border2);border-radius:3px;padding:56px 20px;text-align:center;cursor:pointer;transition:border-color .2s}
.lbox:hover{border-color:var(--gold)}
.lbox .ic{font-size:28px;margin-bottom:10px;opacity:.2}
.lbox p{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase}
.lbox small{font-size:9px;color:var(--muted);display:block;margin-top:5px}
input[type=file]{display:none}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media(max-width:768px){header,.acc-bar,.sbar,main,.ntabs{padding-left:16px;padding-right:16px}.pgrid{grid-template-columns:1fr}.tbl2,.tbl3{grid-template-columns:repeat(3,1fr)}.asel{grid-template-columns:1fr}}

/* ── 訊號記錄頁 ── */
.sig-wrap{padding:20px 32px 48px}
.sig-textarea{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:3px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:16px;padding:12px 14px;resize:vertical;min-height:90px;outline:none;transition:border-color .2s;margin-bottom:10px}
.sig-textarea:focus{border-color:var(--gold)}
.sig-parse-btn{font-family:'IBM Plex Mono',monospace;font-size:15px;letter-spacing:2px;text-transform:uppercase;background:var(--gold);border:none;color:#000;padding:8px 20px;cursor:pointer;border-radius:2px;font-weight:600;margin-bottom:20px}
.sig-parse-btn:hover{opacity:.85}
.sdtab{font-family:'IBM Plex Mono',monospace;font-size:14px;letter-spacing:1px;padding:5px 14px;border-radius:2px;border:1px solid var(--border2);background:none;cursor:pointer;color:var(--muted2);transition:all .2s}
.sdtab:hover{border-color:var(--gold);color:var(--gold)}
.sdtab.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);font-weight:600}
.sdtab.today{border-color:var(--green);color:var(--green)}
.sdtab.today.active{background:rgba(61,214,140,.1)}
.sig-date-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.sig-day-stats{margin-bottom:22px}
.sds{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:13px 16px}
.sds-lbl{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:5px}
.sds-val{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:500}
.setup-grid{display:flex;flex-direction:column;gap:11px}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:3px;overflow:hidden;border-left:3px solid var(--border)}
.scard.sp{border-left-color:var(--gold)}.scard.sa{border-left-color:var(--blue)}.scard.st{border-left-color:var(--purple)}.scard.sc{border-left-color:var(--muted);opacity:.55}.scard.sx{border-left-color:#333;opacity:.6}
.scard-top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;border-bottom:1px solid var(--border)}
.scard-tl{display:flex;align-items:center;gap:8px}
.scard-tr{display:flex;align-items:center;gap:8px}
.scard-num{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--muted2)}
.scard-body{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 16px}
.sf-lbl{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:3px}
.sf-val{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500;color:var(--text)}
.sf-val span{font-size:17px;color:var(--muted2)}
.sf-val.sl-c{color:var(--red)}
.scard-tp{display:flex;gap:6px;padding:7px 16px 11px;border-top:1px solid var(--border)}
.tp-b{flex:1;background:var(--bg1);border:1px solid var(--border);border-radius:2px;padding:6px 8px;transition:all .3s}
.tp-b.hit{background:rgba(61,214,140,.07);border-color:rgba(61,214,140,.3)}
.tp-bl{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:2px}
.tp-bl.hit{color:var(--green)}
.tp-bv{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:500;color:var(--text)}
.tp-bv.hit{color:var(--green)}
.scard-note{padding:5px 16px 8px;font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--muted2);border-top:1px solid var(--border)}
.scard-actions{display:flex;gap:6px;padding:8px 16px;border-top:1px solid var(--border);flex-wrap:wrap}
.sact{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;background:none;border:1px solid var(--border2);color:var(--muted2);padding:3px 10px;cursor:pointer;border-radius:2px;transition:all .15s}
.sact:hover{border-color:var(--gold);color:var(--gold)}
.sact.del:hover{border-color:var(--red);color:var(--red)}
.spill{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;letter-spacing:1px;padding:2px 8px;border-radius:2px;text-transform:uppercase}
.sp-buy{background:rgba(61,214,140,.1);color:var(--green);border:1px solid rgba(61,214,140,.2)}
.sp-sell{background:rgba(255,92,92,.1);color:var(--red);border:1px solid rgba(255,92,92,.2)}
.sp-st{font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:20px;border:1px solid var(--border2);color:var(--muted2);font-family:'IBM Plex Mono',monospace}
.sp-st.pend{border-color:rgba(201,168,76,.4);color:var(--gold);background:rgba(201,168,76,.07)}
.sp-st.tp1{border-color:rgba(176,110,255,.4);color:var(--purple);background:rgba(176,110,255,.07)}
.sctime{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted2)}
.sig-preview{background:var(--bg2);border:1px solid var(--border2);border-radius:3px;padding:14px 16px;margin-bottom:16px;display:none}
.sig-preview.show{display:block}
.sp-title{font-family:'IBM Plex Mono',monospace;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.sp-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.sp-field{background:var(--bg1);border:1px solid var(--border);border-radius:2px;padding:8px 12px;flex:1;min-width:100px}
.sp-flbl{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:3px;font-family:'IBM Plex Mono',monospace}
.sp-fval input{background:none;border:none;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:500;width:100%;outline:none}
.sp-confirm{font-family:'IBM Plex Mono',monospace;font-size:15px;letter-spacing:2px;text-transform:uppercase;background:var(--gold);border:none;color:#000;padding:7px 18px;cursor:pointer;border-radius:2px;font-weight:600}
.sp-cancel{font-family:'IBM Plex Mono',monospace;font-size:15px;letter-spacing:2px;text-transform:uppercase;background:none;border:1px solid var(--border2);color:var(--muted2);padding:7px 18px;cursor:pointer;border-radius:2px}
</style>

<body>

<div id="login-overlay" style="display:flex;position:fixed;inset:0;background:#0D0D0D;z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:20px">

<script>
const ACCS={live:{name:'真實帳號 (9940267)',chs:['EMPIRE']},demo:{name:'模擬帳號 (52799450)',chs:['SNIPER','VIP']}};
const CST={EMPIRE:{cls:'be',col:'var(--blue)',sc:'se'},SNIPER:{cls:'bs',col:'var(--orange)',sc:'ss'},VIP:{cls:'bv',col:'var(--purple)',sc:'sv'}};
let cur='live',flt='all',pendAcc=null,dropFile=null;
const sk=a=>'gsp_v2_'+a;
const save=(a,d)=>{try{localStorage.setItem(sk(a),JSON.stringify(d));}catch(e){}};
const load=a=>{try{const r=localStorage.getItem(sk(a));return r?JSON.parse(r):[]; }catch(e){return[];}};
const get=()=>load(cur);
function merge(ex,inc){const k=t=>`${(t.open_time||'').slice(0,16)}|${t.direction}|${t.entry}|${t.volume}|${t.comment||''}`;const m=new Map();ex.forEach(t=>m.set(k(t),t));let a=0,s=0;inc.forEach(t=>{const kk=k(t);m.has(kk)?s++:(m.set(kk,t),a++);});return{merged:[...m.values()].sort((a,b)=>new Date(b.open_time)-new Date(a.open_time)),added:a,skipped:s};}
function missing(tr){const cl=tr.filter(t=>t.status==='closed');if(cl.length<2)return[];const dy=new Set(cl.map(t=>fd(t.open_time)));const ms=[];const st=toK(cl[cl.length-1].open_time);const en=toK(cl[0].open_time);const c=new Date(st);c.setUTCHours(0,0,0,0);while(c<=en){const dw=c.getUTCDay();if(dw!==0&&dw!==6){const l=`${c.getUTCFullYear()}/${String(c.getUTCMonth()+1).padStart(2,'0')}/${String(c.getUTCDate()).padStart(2,'0')}`;if(!dy.has(l))ms.push(l);}c.setUTCDate(c.getUTCDate()+1);}return ms;}
setInterval(()=>{const n=new Date();document.getElementById('clock').textContent=`${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')} `+n.toLocaleTimeString('ko-KR',{hour12:false});},1000);
const toK=iso=>new Date(new Date(iso).getTime()+9*3600*1000);
const fd=iso=>{const k=toK(iso);return `${k.getUTCFullYear()}/${String(k.getUTCMonth()+1).padStart(2,'0')}/${String(k.getUTCDate()).padStart(2,'0')}`;};
const ft=iso=>{const k=toK(iso);return `${String(k.getUTCHours()).padStart(2,'0')}:${String(k.getUTCMinutes()).padStart(2,'0')}`;};
const r2=v=>Math.round(v*100)/100;
const ps=v=>v>=0?`+${v.toFixed(2)}`:v.toFixed(2);
const pc=v=>v>=0?'pp':'pn';
function swAcc(a){cur=a;flt='all';document.getElementById('abl').className='acc-btn'+(a==='live'?' al':'');document.getElementById('abd').className='acc-btn'+(a==='demo'?' ad':'');updF();rAll();}
function updF(){const chs=ACCS[cur].chs;['c1','c2','c3'].forEach((c,i)=>{const btn=document.getElementById('f'+(i+1));if(i<chs.length){const ch=chs[i];btn.textContent=ch;btn.style.display='inline-block';}else btn.style.display='none';});document.getElementById('tc3').style.display=chs.length>2?'':'none';document.getElementById('tband').className='tband'+(chs.length>2?' tbl3':' tbl2');chs.forEach((ch,i)=>{document.getElementById('tl'+(i+1)).textContent=ch+' 盈虧';const st=CST[ch];document.getElementById('tc'+(i+1)).className=`tc c${ch.toLowerCase()[0]}`;});}
function openM(){document.getElementById('modal').classList.add('show');}
function closeM(){document.getElementById('modal').classList.remove('show');pendAcc=null;dropFile=null;document.getElementById('ol').className='aopt';document.getElementById('od').className='aopt';document.getElementById('bcon').disabled=true;}
function selAcc(a){pendAcc=a;document.getElementById('ol').className='aopt'+(a==='live'?' sl':'');document.getElementById('od').className='aopt'+(a==='demo'?' sd':'');document.getElementById('bcon').disabled=false;}
function doUpload(){const a=pendAcc;closeM();if(dropFile){proc(dropFile,a);dropFile=null;}else{window._pa=a;document.getElementById('fi').click();}}
document.getElementById('fi').addEventListener('change',function(){if(this.files[0]){proc(this.files[0],window._pa||cur);window._pa=null;this.value='';}});
document.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('dov').classList.add('show');});
document.addEventListener('dragleave',e=>{if(!e.relatedTarget)document.getElementById('dov').classList.remove('show');});
document.addEventListener('drop',e=>{e.preventDefault();document.getElementById('dov').classList.remove('show');if(e.dataTransfer.files[0]){dropFile=e.dataTransfer.files[0];openM();}});
function proc(file,acc){const name=file.name.toLowerCase();if(name.endsWith('.xlsx')||name.endsWith('.xls')){const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];apply(pxlsx(XLSX.utils.sheet_to_json(ws,{header:1,defval:''})),file.name,acc);}catch(er){alert('XLSX:'+er.message);}};r.readAsArrayBuffer(file);}else{const r=new FileReader();r.onload=e=>{try{const b=new Uint8Array(e.target.result);const s=(b[0]===0xFF&&b[1]===0xFE)?2:0;apply(phtm(new TextDecoder('utf-16le').decode(b.slice(s))),file.name,acc);}catch(er){alert('HTM:'+er.message);}};r.readAsArrayBuffer(file);}}
function apply(inc,fname,acc){const vs=ACCS[acc].chs;const fl=inc.filter(t=>vs.includes(t.source));if(!fl.length){alert(`此檔案中沒有 ${vs.join('/')} 的記錄`);return;}const{merged,added,skipped}=merge(load(acc),fl);save(acc,merged);cur=acc;document.getElementById('abl').className='acc-btn'+(acc==='live'?' al':'');document.getElementById('abd').className='acc-btn'+(acc==='demo'?' ad':'');const ms=missing(merged);const ab=document.getElementById('abar');if(ms.length){ab.textContent=`⚠️ 缺失數據：${ms.slice(0,5).join('、')}${ms.length>5?` 等 ${ms.length} 天`:''}  —  請確認是否需要補充上傳`;ab.classList.add('show');}else ab.classList.remove('show');document.getElementById('stxt').textContent=`【${ACCS[acc].name}】新增 ${added} 筆，重複略過 ${skipped} 筆 | ${fname}`;updF();rAll();}
function clrAcc(){if(!confirm(`確定清除【${ACCS[cur].name}】的所有數據？`))return;localStorage.removeItem(sk(cur));document.getElementById('abar').classList.remove('show');document.getElementById('stxt').textContent='尚未載入數據';rAll();}
function pt5(str){if(!str||!str.trim())return null;const d=new Date(str.trim().replace(/\./g,'-'));return isNaN(d.getTime())?null:d;}
function gsrc(c){const cu=(c||'').toUpperCase().trim();if(cu==='IN'||cu==='OUT')return '__SKIP__';if(cu.startsWith('SNIPER')||cu.startsWith('GS_')||cu.startsWith('GS'))return 'SNIPER';if(cu.startsWith('VIP'))return 'VIP';return 'EMPIRE';}
function phtm(html){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const res=[];
  for(const row of doc.querySelectorAll('tr')){
    const hiddenA=row.querySelector('td.hidden[colspan="8"]');
    if(!hiddenA) continue;
    const allCells=[...row.querySelectorAll('td')];
    const vis=allCells.filter(td=>!td.classList.contains('hidden'));
    if(vis.length<13) continue;
    const v=vis.map(td=>td.textContent.trim());
    if(!/^\d{4}\.\d{2}\.\d{2}/.test(v[0])) continue;
    if(!v[2].match(/xauusd|gold|xau/i)) continue;
    const type=v[3].toLowerCase();
    if(type!=='buy'&&type!=='sell') continue;
    const comment=hiddenA.textContent.trim();
    const src=gsrc(comment);
    if(src==='__SKIP__') continue;
    // profit 在 colspan=2 的 td
    const profitTd=allCells.find(td=>td.getAttribute('colspan')==='2');
    const pr=parseFloat(profitTd?profitTd.textContent.trim():v[12]);
    const pnl=isNaN(pr)?null:r2(pr);
    const op=pt5(v[0]),cl=pt5(v[8]||'');
    if(!op) continue;
    res.push({open_time:op.toISOString(),close_time:cl?cl.toISOString():null,
      direction:type==='buy'?'BUY':'SELL',entry:r2(parseFloat(v[5])||0),
      volume:parseFloat(v[4])||0,pnl,status:cl?'closed':'open',
      source:src,comment:comment.toUpperCase()});
  }
  return res;
}
function pxlsx(rows){const pm={};for(const cells of rows){if(!cells||cells.length<6)continue;let ti=-1;for(let i=0;i<cells.length;i++){if(/\d{4}[.\-\/]\d{2}[.\-\/]\d{2}/.test(String(cells[i]||''))){ti=i;break;}}if(ti<0)continue;const ts=String(cells[ti]||''),tk=String(cells[ti-1]||cells[0]||'');const type=String(cells[ti+1]||'').toLowerCase().trim(),sz=parseFloat(cells[ti+2])||0;const item=String(cells[ti+3]||''),price=parseFloat(cells[ti+4])||0;let pnl=NaN;for(let i=cells.length-1;i>=cells.length-4&&i>=0;i--){const v=parseFloat(cells[i]);if(!isNaN(v)){pnl=v;break;}}if(!item.match(/xauusd|gold|xau/i)||sz<=0)continue;const t=pt5(ts);if(!t)continue;if(type==='buy'||type==='sell'){const xsrc=gsrc(String(cells[ti-2]||''));if(xsrc==='__SKIP__')continue;pm[tk]={open_time:t.toISOString(),direction:type==='buy'?'BUY':'SELL',entry:r2(price),volume:sz,close_time:null,pnl:null,status:'open',source:xsrc||'OTHER',comment:String(cells[ti-2]||'').toUpperCase()};}else if(type.includes('close')||type==='t/p'||type==='s/l'){if(pm[tk]&&!pm[tk].close_time){pm[tk].close_time=t.toISOString();pm[tk].pnl=isNaN(pnl)?null:r2(pnl);pm[tk].status='closed';}}}return Object.values(pm).filter(p=>p.open_time);}
function cst(arr){const cl=arr.filter(t=>t.status==='closed'&&t.pnl!=null);const w=cl.filter(t=>parseFloat(t.pnl)>0).length,l=cl.filter(t=>parseFloat(t.pnl)<=0).length,n=cl.length;const p=cl.reduce((s,t)=>s+parseFloat(t.pnl||0),0);const b=cl.length?Math.max(...cl.map(t=>parseFloat(t.pnl))):0,wo=cl.length?Math.min(...cl.map(t=>parseFloat(t.pnl))):0;return{total:n,wins:w,losses:l,wr:n?(w/n*100).toFixed(1):'—',pnl:r2(p),avg:n?r2(p/n):0,best:r2(b),worst:r2(wo)};}
function swTab(tab,btn){document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));document.getElementById('tp-'+tab).classList.add('active');btn.classList.add('active');if(tab==='daily')rPer('dg',gDay());if(tab==='weekly')rPer('wg',gWk());if(tab==='monthly')rPer('mg',gMo());}

function mkCard(lbl,ad){const s=cst(ad);const chs=ACCS[cur].chs;if(!s.total)return`<div class="pce"><span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text2)">${lbl}</span><span style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)">無記錄</span></div>`;const wr=s.wr==='—'?0:parseFloat(s.wr);const bc=wr>=50?'var(--green)':'var(--red)';const sub=ch=>{const sd=cst(ad.filter(t=>t.source===ch));const st=CST[ch];if(!sd.total)return`<div class="sch ${st.sc}"><div class="sht">${ch}</div><div style="font-size:9px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase">無記錄</div></div>`;const sw=sd.wr==='—'?0:parseFloat(sd.wr);return`<div class="sch ${st.sc}"><div class="sht">${ch}</div><div class="shr"><span class="shk">開單</span><span class="shv" style="color:var(--gold)">${sd.total}</span></div><div class="shr"><span class="shk">勝率</span><span class="shv ${sw>=50?'pp':'pn'}">${sd.wr}${sd.wr!=='—'?'%':''}</span></div><div class="shr"><span class="shk">盈虧</span><span class="shv ${pc(sd.pnl)}">${ps(sd.pnl)}</span></div><div class="shr"><span class="shk">勝/敗</span><span class="shv"><span class="pp">${sd.wins}</span><span style="color:var(--muted2)"> / </span><span class="pn">${sd.losses}</span></span></div></div>`;};return`<div class="pcard"><div class="pch"><div class="pcl">${lbl}</div><div class="pcp ${pc(s.pnl)}">${ps(s.pnl)}</div></div><div class="pcb"><div class="pcr"><span class="pck">開單次數</span><span class="pcv" style="color:var(--gold)">${s.total}</span></div><div class="pcr"><span class="pck">獲利/虧損</span><span class="pcv"><span class="pp">${s.wins}</span><span style="color:var(--muted2)"> / </span><span class="pn">${s.losses}</span></span></div><div class="pcr"><span class="pck">勝率</span><span class="pcv ${wr>=50?'pp':'pn'}">${s.wr}${s.wr!=='—'?'%':''}</span></div><div class="pcr"><span class="pck">平均每單</span><span class="pcv ${pc(s.avg)}">${ps(s.avg)}</span></div><div class="pcr"><span class="pck">最佳/最差</span><span class="pcv"><span class="pp">+${s.best.toFixed(2)}</span><span style="color:var(--muted2)"> / </span><span class="pn">${s.worst.toFixed(2)}</span></span></div></div><div class="wrw"><div class="wrl"><span>勝率</span><span>${s.wr}${s.wr!=='—'?'%':''}</span></div><div class="wrt"><div class="wrf" style="width:${wr}%;background:${bc}"></div></div></div><div class="pcsub">${chs.map(ch=>sub(ch)).join('')}</div></div>`;}
function rPer(gid,pers){const el=document.getElementById(gid);const h=get();if(!h.length){el.innerHTML=`<div class="lbox" style="cursor:default;grid-column:1/-1" onclick="openM()"><div class="ic">📂</div><p>請先匯入 MT5 報告</p></div>`;return;}el.innerHTML=pers.map((p,i)=>`<div style="animation:fi .25s ease ${i*25}ms both">${mkCard(p.label,h.filter(t=>{const d=new Date(t.open_time);return d>=p.start&&d<=p.end;}))}</div>`).join('');}
function gDay(){const ps=[];for(let i=0;i<=13;i++){const d=new Date();d.setDate(d.getDate()-i);d.setHours(0,0,0,0);const e=new Date(d);e.setHours(23,59,59,999);ps.push({label:i===0?'今日':i===1?'昨日':`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`,start:new Date(d),end:e});}return ps;}
function gWk(){const ps=[];for(let i=0;i>=-7;i--){const now=new Date(),day=now.getDay()||7;const m=new Date(now);m.setDate(now.getDate()-day+1+i*7);m.setHours(0,0,0,0);const s=new Date(m);s.setDate(m.getDate()+6);s.setHours(23,59,59,999);ps.push({label:i===0?'本週':i===-1?'上週':`${m.toLocaleDateString('zh-TW',{month:'short',day:'numeric'})} – ${s.toLocaleDateString('zh-TW',{month:'short',day:'numeric'})}`,start:m,end:s});}return ps;}
function gMo(){const ps=[],n=new Date();for(let i=0;i>=-11;i--){const d=new Date(n.getFullYear(),n.getMonth()+i,1);ps.push({label:i===0?'本月':`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`,start:new Date(d.getFullYear(),d.getMonth(),1),end:new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59)});}return ps;}

async function initAuth(){
  // 處理 Google OAuth 回調（URL hash 含 access_token）
  if(window.location.hash && window.location.hash.includes('access_token')){
    // 讓 Supabase 從 hash 中解析 session，然後清除 hash
    await supa.auth.getSession();
    window.history.replaceState(null,'',window.location.pathname);
  }

  const{data:{session}}=await supa.auth.getSession();
  if(session){
    currentUser=session.user;
    document.getElementById('login-overlay').style.display='none';
    document.getElementById('user-info').style.display='flex';
    document.getElementById('user-email').textContent=currentUser.email;
    initSigDatePick();
    updF();rAll();

    if(ms.length){const ab=document.getElementById('abar');ab.textContent=`⚠️ 缺失數據：${ms.slice(0,5).join('、')}${ms.length>5?` 等 ${ms.length} 天`:''}  —  請確認是否需要補充上傳`;ab.classList.add('show');}
  } else {
    document.getElementById('login-overlay').style.display='flex';
  }
  supa.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){
      currentUser=session.user;
      document.getElementById('login-overlay').style.display='none';
      document.getElementById('user-info').style.display='flex';
      document.getElementById('user-email').textContent=currentUser.email;
      updF();rAll();
    }
    if(event==='SIGNED_OUT'){
      currentUser=null;
      document.getElementById('login-overlay').style.display='flex';
      document.getElementById('user-info').style.display='none';
    }
  });
}

async function getData(){
  if(!currentUser)return[];
  const chs=ACCS[cur].chs;
  const{data,error}=await supa.from('trades').select('*')
    .eq('user_id',currentUser.id)
    .eq('account_type',cur)
    .in('source', chs)

  return(data||[]).map(r=>({
    open_time:r.open_time,close_time:r.close_time,
    direction:r.direction,entry:parseFloat(r.entry||0),
    volume:parseFloat(r.volume||0),pnl:r.pnl!=null?parseFloat(r.pnl):null,
    status:r.status,source:r.source,comment:r.comment||''
  }));
}

async function apply(inc,fname,acc){
  if(!currentUser){alert('請先登入');return;}
  const vs=ACCS[acc].chs;
  const fl=inc.filter(t=>vs.includes(t.source));
  if(!fl.length){alert(`此檔案中沒有 ${vs.join('/')} 的記錄`);return;}

  // 取得已有數據做去重
  const{data:existing}=await supa.from('trades').select('open_time,direction,entry,volume,comment')
    .eq('user_id',currentUser.id).eq('account_type',acc);
  const k=t=>`${(t.open_time||'').slice(0,16)}|${t.direction}|${t.entry}|${t.volume}|${(t.comment||'').toUpperCase()}`;
  const existKeys=new Set((existing||[]).map(k));
  const toInsert=fl.filter(t=>!existKeys.has(k(t)));
  const skipped=fl.length-toInsert.length;

  if(toInsert.length>0){
    const rows=toInsert.map(t=>({
      user_id:currentUser.id,account_type:acc,
      open_time:t.open_time,close_time:t.close_time||null,
      direction:t.direction,entry:t.entry,volume:t.volume,
      pnl:t.pnl,status:t.status,source:t.source,comment:t.comment||''
    }));
    const{error}=await supa.from('trades').insert(rows);
    if(error){alert('儲存失敗：'+error.message);return;}
  }

  cur=acc;
  document.getElementById('abl').className='acc-btn'+(acc==='live'?' al':'');
  document.getElementById('abd').className='acc-btn'+(acc==='demo'?' ad':'');
  const allData=await getData();
  const ms=missing(allData);
  const ab=document.getElementById('abar');
  if(ms.length){ab.textContent=`⚠️ 缺失數據：${ms.slice(0,5).join('、')}${ms.length>5?` 等 ${ms.length} 天`:''} — 請確認補充上傳`;ab.classList.add('show');}
  else ab.classList.remove('show');
  document.getElementById('stxt').textContent=`【${ACCS[acc].name}】新增 ${toInsert.length} 筆，重複略過 ${skipped} 筆 | ${fname}`;
  updF();rAll();
}

// 解析 Telegram 訊息
function parseTelegramMsg(text) {
  const t = text.toUpperCase();
  const result = { direction: null, entry_low: null, entry_high: null, sl: null, tps: [], note: '' };

  // 方向
  if (/BUY/.test(t)) result.direction = 'BUY';
  else if (/SELL/.test(t)) result.direction = 'SELL';

  // 進場區間 XAU/USD XXXX - XXXX
  const entryM = text.match(/XAU[/\s]?USD[\s]+([\d.]+)[\s]*[-–][\s]*([\d.]+)/i);
  if (entryM) {
    const v1 = parseFloat(entryM[1]), v2 = parseFloat(entryM[2]);
    result.entry_low  = Math.min(v1, v2);
    result.entry_high = Math.max(v1, v2);
  }

  // SL
  const slM = text.match(/(?:StopLoss|Stop Loss|SL)[:\s]+([\d.]+)/i);
  if (slM) result.sl = parseFloat(slM[1]);

  // TPs — 每行含 TakeProfit，逐行提取，同一行有多個數字也各算一個TP
  const lines = text.split('\n');
  const notes = [];
  lines.forEach(line => {
    if (/takeprofit|take profit/i.test(line)) {
      const nums = line.match(/\d{4,}\.?\d*/g);
      if (nums) {
        nums.forEach(n => result.tps.push(parseFloat(n)));
      }
      if (/OPEN/i.test(line)) notes.push(`TP${result.tps.length} OPEN`);
    }
  });
  result.note = notes.join(' | ');
  return result;
}

function parseSigInput() {
  const text = document.getElementById('sig-input').value.trim();
  if (!text) return alert('請貼上訊號訊息');
  const r = parseTelegramMsg(text);
  if (!r.direction) return alert('無法識別方向（BUY/SELL）');

  document.getElementById('pf-dir').value  = r.direction || '';
  document.getElementById('pf-el').value   = r.entry_low  || '';
  document.getElementById('pf-eh').value   = r.entry_high || '';
  document.getElementById('pf-sl').value   = r.sl         || '';
  document.getElementById('pf-tp1').value  = r.tps[0]     || '';
  document.getElementById('pf-tp2').value  = r.tps[1]     || '';
  document.getElementById('pf-tp3').value  = r.tps[2]     || '';
  document.getElementById('pf-note').value = r.note       || '';
  document.getElementById('sig-preview').classList.add('show');
}

function closeSigPreview() {
  document.getElementById('sig-preview').classList.remove('show');
}

function initSigDatePick() {
  // 預設今天（KST）
  const now = new Date(new Date().getTime() + 9*3600*1000);
  const y = now.getUTCFullYear();
  const m = String(now.getUTCMonth()+1).padStart(2,'0');
  const d = String(now.getUTCDate()).padStart(2,'0');
  document.getElementById('sig-date-pick').value = `${y}-${m}-${d}`;
}

function setSigDateToday() {
  initSigDatePick();
}

async function saveSig() {
  if (!currentUser) return alert('請先登入');

  // 取得選擇的日期，轉成 ISO（當天 12:00 KST = 03:00 UTC）
  const dateVal = document.getElementById('sig-date-pick').value;
  if (!dateVal) return alert('請選擇日期');
  const [y, m, d] = dateVal.split('-').map(Number);
  // 用 KST 12:00 存入，確保日期顯示正確
  const created_at = new Date(Date.UTC(y, m-1, d, 3, 0, 0)).toISOString();

  const record = {
    id:          `MANUAL_${Date.now()}`,
    channel:     'EMPIRE',
    direction:   document.getElementById('pf-dir').value.toUpperCase(),
    entry_low:   parseFloat(document.getElementById('pf-el').value)  || 0,
    entry_high:  parseFloat(document.getElementById('pf-eh').value) || 0,
    sl:          parseFloat(document.getElementById('pf-sl').value)  || 0,
    tp1:         parseFloat(document.getElementById('pf-tp1').value) || 0,
    tp2:         parseFloat(document.getElementById('pf-tp2').value) || 0,
    tp3:         parseFloat(document.getElementById('pf-tp3').value) || null,
    note:        document.getElementById('pf-note').value || '',
    status:      'PENDING',
    tp1_hit:     false,
    tp2_hit:     false,
    tp3_hit:     false,
    created_at,
    updated_at:  new Date().toISOString(),
  };
  const { error } = await supa.from(SIG_TABLE).insert(record);
  if (error) return alert('儲存失敗: ' + error.message);
  closeSigPreview();
  document.getElementById('sig-input').value = '';
  // 儲存後跳到該日期
  sigSelectedDate = toKSTDateSig(created_at);
  await loadSigSetups();
  alert('✅ 訊號已儲存');
}

async function updateSigStatus(id, status) {
  const extra = {};
  let realStatus = status;
  if (status === 'TP1_HIT')   { extra.tp1_hit = true; realStatus = 'TP1_HIT'; }
  if (status === 'TP2_HIT')   { extra.tp1_hit = true; extra.tp2_hit = true; realStatus = 'TP2_HIT'; }
  if (status === 'TP3_HIT')   { extra.tp1_hit = true; extra.tp2_hit = true; extra.tp3_hit = true; realStatus = 'TP3_HIT'; }
  if (status === 'BREAKEVEN') { realStatus = 'ACTIVE'; }
  if (status === 'SL_HIT')    { realStatus = 'CLOSED'; }
  await supa.from(SIG_TABLE).update({ status: realStatus, ...extra, updated_at: new Date().toISOString() }).eq('id', id);
  await loadSigSetups();
}

async function deleteSig(id) {
  if (!confirm('確定刪除這筆訊號？')) return;
  await supa.from(SIG_TABLE).delete().eq('id', id);
  await loadSigSetups();
}

async function loadSigSetups() {
  const { data } = await supa.from(SIG_TABLE).select('*').eq('channel', 'EMPIRE').order('created_at', { ascending: false }).limit(200);
  sigSetups = data || [];
  renderSigDateTabs();
  if (sigSelectedDate) renderSigCards(sigSelectedDate);
  else if (sigSetups.length) {
    sigSelectedDate = toKSTDateSig(sigSetups[0].created_at);
    renderSigCards(sigSelectedDate);
  }
}

function toKSTDateSig(iso) {
  const d = new Date(new Date(iso).getTime() + 9 * 3600 * 1000);
  return `${d.getUTCFullYear()}/${String(d.getUTCMonth()+1).padStart(2,'0')}/${String(d.getUTCDate()).padStart(2,'0')}`;
}
function toKSTTimeSig(iso) {
  const d = new Date(new Date(iso).getTime() + 9 * 3600 * 1000);
  return `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
}
function todayKSTSig() { return toKSTDateSig(new Date().toISOString()); }

function renderSigDateTabs() {
  const dates = [...new Set(sigSetups.map(s => toKSTDateSig(s.created_at)))].sort((a,b) => b.localeCompare(a));
  const today = todayKSTSig();
  // 只在沒有選中日期時，才預設選第一個（最新）
  if (!sigSelectedDate && dates.length) sigSelectedDate = dates[0];
  // 若已選的日期不在列表中（資料更新後），重設為第一個
  if (sigSelectedDate && dates.length && !dates.includes(sigSelectedDate)) sigSelectedDate = dates[0];
  document.getElementById('sig-date-tabs').innerHTML = dates.map(d => {
    const isToday = d === today;
    const isActive = d === sigSelectedDate;
    // 用 data-date 屬性傳遞日期，避免斜線在 onclick 字串中造成問題
    return `<button class="sdtab${isToday?' today':''}${isActive?' active':''}" data-date="${d}" onclick="selectSigDate(this.dataset.date,this)">${isToday?'今日 '+d:d}</button>`;
  }).join('');
}

function selectSigDate(date, btn) {
  sigSelectedDate = date;
  // 更新所有 tab 的 active 狀態
  document.querySelectorAll('.sdtab').forEach(b => {
    b.classList.toggle('active', b.dataset.date === date);
  });
  renderSigCards(date);
}

const SIG_ST_LABEL = { PENDING:'進行中', ACTIVE:'保本完成', TP1_HIT:'TP1✓', TP2_HIT:'TP2✓', TP3_HIT:'TP3✓', CANCELLED:'取消', CLOSED:'止損/平倉' };
const SIG_ST_CLS   = { PENDING:'sp', ACTIVE:'sx', TP1_HIT:'st', TP2_HIT:'st', TP3_HIT:'st', CANCELLED:'sc', CLOSED:'sx' };
const SIG_ST_PILL  = { PENDING:'pend', ACTIVE:'canc', TP1_HIT:'tp1', TP2_HIT:'tp1', TP3_HIT:'tp1', CANCELLED:'canc', CLOSED:'canc' };

function renderSigCards(date) {
  const items = sigSetups.filter(s => toKSTDateSig(s.created_at) === date);

  // ── 盈虧計算 ──
  // 每點盈虧 = 距離 × 0.05手 × 100 = 距離 × 5 USD
  // TP1: 1張平倉，TP2: 再平1張（累計TP1+TP2距離），TP3: 再平1張（累計全部）
  // 止損: 3張全虧
  const UNIT = 5; // 0.05手 × 100

  function calcPnl(s) {
    const isBuy = s.direction === 'BUY';
    const entry = isBuy ? +s.entry_high : +s.entry_low;
    const sl  = +s.sl;
    const tp1 = +s.tp1, tp2 = +s.tp2, tp3 = s.tp3 ? +s.tp3 : null;

    const d1 = Math.abs(tp1 - entry);
    const d2 = tp2 ? Math.abs(tp2 - entry) : 0;
    const d3 = tp3 ? Math.abs(tp3 - entry) : 0;
    const dsl = Math.abs(sl - entry);

    if (s.status === 'CLOSED') {
      return -(dsl * UNIT * 3);
    }
    if (s.tp3_hit && tp3) {
      return (d1 + d2 + d3) * UNIT;
    }
    if (s.tp2_hit) {
      return (d1 + d2) * UNIT;
    }
    if (s.tp1_hit) {
      return d1 * UNIT;
    }
    return null;
  }

  // ── 統計計數：每個狀態互斥，按最高TP計算 ──
  const cnt_tp3      = items.filter(s => s.tp3_hit).length;
  const cnt_tp2      = items.filter(s => s.tp2_hit && !s.tp3_hit).length;
  const cnt_tp1      = items.filter(s => s.tp1_hit && !s.tp2_hit && !s.tp3_hit).length;
  const cnt_be       = items.filter(s => s.status === 'ACTIVE' && !s.tp1_hit).length;
  const cnt_cancel   = items.filter(s => s.status === 'CANCELLED').length;
  const cnt_sl       = items.filter(s => s.status === 'CLOSED').length;
  const cnt_pending  = items.filter(s => s.status === 'PENDING').length;
  // 合計應等於 items.length
  const cnt_total = cnt_tp3 + cnt_tp2 + cnt_tp1 + cnt_be + cnt_cancel + cnt_sl + cnt_pending;

  // ── 盈虧統計 ──
  const pnlList = items.map(s => calcPnl(s)).filter(v => v !== null);
  const totalPnl  = pnlList.reduce((a,b) => a+b, 0);
  const grossWin  = pnlList.filter(v => v > 0).reduce((a,b) => a+b, 0);
  const grossLoss = pnlList.filter(v => v < 0).reduce((a,b) => a+b, 0);
  const winRate   = pnlList.length > 0
    ? (pnlList.filter(v=>v>0).length / pnlList.length * 100).toFixed(0)
    : '—';
  const pnlColor  = totalPnl >= 0 ? 'var(--green)' : 'var(--red)';

  document.getElementById('sig-day-stats').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:10px">
      <div class="sds"><div class="sds-lbl">總訊號</div><div class="sds-val" style="color:var(--gold)">${items.length}</div></div>
      <div class="sds"><div class="sds-lbl">TP1 ✓</div><div class="sds-val" style="color:var(--purple)">${cnt_tp1}</div></div>
      <div class="sds"><div class="sds-lbl">TP2 ✓</div><div class="sds-val" style="color:var(--purple)">${cnt_tp2}</div></div>
      <div class="sds"><div class="sds-lbl">TP3 ✓</div><div class="sds-val" style="color:var(--purple)">${cnt_tp3}</div></div>
      <div class="sds"><div class="sds-lbl">保本</div><div class="sds-val" style="color:var(--blue)">${cnt_be}</div></div>
      <div class="sds"><div class="sds-lbl">取消</div><div class="sds-val" style="color:var(--muted2)">${cnt_cancel}</div></div>
      <div class="sds"><div class="sds-lbl">止損</div><div class="sds-val" style="color:var(--red)">${cnt_sl}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px">
      <div class="sds"><div class="sds-lbl">預計盈虧</div><div class="sds-val" style="color:${pnlColor}">${totalPnl>=0?'+':''}${totalPnl.toFixed(2)} USD</div></div>
      <div class="sds"><div class="sds-lbl">總盈利</div><div class="sds-val" style="color:var(--green)">+${grossWin.toFixed(2)} USD</div></div>
      <div class="sds"><div class="sds-lbl">總虧損</div><div class="sds-val" style="color:var(--red)">${grossLoss.toFixed(2)} USD</div></div>
      <div class="sds"><div class="sds-lbl">勝率</div><div class="sds-val" style="color:${parseFloat(winRate)>=50?'var(--green)':'var(--red)'}">${winRate}${winRate!=='—'?'%':''}</div></div>
    </div>
  `;

  const el = document.getElementById('sig-cards');
  if (!items.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;font-family:IBM Plex Mono,monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2)">當天無訊號</div>';
    return;
  }

  // 按時間升序排列，Setup編號=i+1，但顯示時反轉讓最新在最上面
  const sorted = [...items].sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  const numbered = sorted.map((s, i) => ({ ...s, setupNum: i + 1 }));
  const displayed = [...numbered].reverse();

  el.innerHTML = displayed.map((s) => {
    const setupNum = s.setupNum;
    const dirCls = s.direction === 'BUY' ? 'sp-buy' : 'sp-sell';
    const stCls  = SIG_ST_CLS[s.status]  || 'sp';
    const stLbl  = SIG_ST_LABEL[s.status] || s.status;
    const stPill = SIG_ST_PILL[s.status]  || '';
    const tp3html = s.tp3 ? `
      <div class="tp-b ${s.tp3_hit?'hit':''}">
        <div class="tp-bl ${s.tp3_hit?'hit':''}">TP3${s.tp3_hit?' ✓':''}</div>
        <div class="tp-bv ${s.tp3_hit?'hit':''}">${(+s.tp3).toFixed(2)}</div>
      </div>` : '';
    const noteHtml = s.note ? `<div class="scard-note">📝 ${s.note}</div>` : '';
    const ctime = toKSTTimeSig(s.created_at);
    const pnl = calcPnl(s);
    const pnlHtml = pnl !== null
      ? `<span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:${pnl>=0?'var(--green)':'var(--red)'};">${pnl>=0?'+':''}${pnl.toFixed(2)} USD</span>`
      : '';

    const actions = `
      <button class="sact" onclick="updateSigStatus('${s.id}','TP1_HIT')">TP1</button>
      <button class="sact" onclick="updateSigStatus('${s.id}','TP2_HIT')">TP2</button>
      <button class="sact" onclick="updateSigStatus('${s.id}','TP3_HIT')">TP3</button>
      <button class="sact" onclick="updateSigStatus('${s.id}','BREAKEVEN')">保本</button>
      <button class="sact" onclick="updateSigStatus('${s.id}','CANCELLED')">取消</button>
      <button class="sact" onclick="updateSigStatus('${s.id}','SL_HIT')">止損</button>
      <button class="sact del" onclick="deleteSig('${s.id}')">刪除</button>
      ${pnlHtml}
    `;

    return `<div class="scard ${stCls}">
      <div class="scard-top">
        <div class="scard-tl">
          <span class="scard-num">Setup #${setupNum}</span>
          <span class="spill ${dirCls}">${s.direction}</span>
        </div>
        <div class="scard-tr">
          <span class="sctime">${ctime}</span>
          <span class="sp-st ${stPill}">${stLbl}</span>
        </div>
      </div>
      <div class="scard-body">
        <div><div class="sf-lbl">進場區間</div><div class="sf-val">${(+s.entry_low).toFixed(0)} <span>— ${(+s.entry_high).toFixed(0)}</span></div></div>
        <div><div class="sf-lbl">止損 SL</div><div class="sf-val sl-c">${(+s.sl).toFixed(2)}</div></div>
      </div>
      <div class="scard-tp">
        <div class="tp-b ${s.tp1_hit?'hit':''}">
          <div class="tp-bl ${s.tp1_hit?'hit':''}">TP1${s.tp1_hit?' ✓':''}</div>
          <div class="tp-bv ${s.tp1_hit?'hit':''}">${(+s.tp1).toFixed(2)}</div>
        </div>
        <div class="tp-b ${s.tp2_hit?'hit':''}">
          <div class="tp-bl ${s.tp2_hit?'hit':''}">TP2${s.tp2_hit?' ✓':''}</div>
          <div class="tp-bv ${s.tp2_hit?'hit':''}">${(+s.tp2).toFixed(2)}</div>
        </div>
        ${tp3html}
      </div>
      ${noteHtml}
      <div class="scard-actions">${actions}</div>
    </div>`;
  }).join('');
}



initAuth();

</script>
